{{- /*
Create a SealedSecret per application that contains the encrypted sshPrivateKey
and populates repo metadata from each application's values.
*/ -}}
{{- $argocdNamespace := default "argocd" .Values.argocdNamespace }}
{{- range $idx, $application := .Values.applications }}
{{- $repoURL := default $application.repoURL $application.repo_url }}
{{- if $repoURL }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ default (printf "%s-repo-secret" $application.name) $application.repoSecretName | quote }}
  namespace: {{ $argocdNamespace | quote }}
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  encryptedData:
    sshPrivateKey: ""
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      labels:
        argocd.argoproj.io/secret-type: repository
    data:
      url: {{ $repoURL | quote }}
      type: {{ default "git" $application.repo_type | quote }}
      insecure: {{ default "true" (default $application.repoInsecure $application.repo_insecure) | quote }}
{{- end }}
{{- end }}
